name: Deploy to Pi

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: [self-hosted, pi-bordplacering]
    steps:
      - name: Pull latest code
        run: |
          cd ~/apps/bordplacering
          git pull origin master

      - name: Install dependencies
        run: |
          cd ~/apps/bordplacering
          npm install --omit=dev

      - name: Restart pm2
        run: |
          cd ~/apps/bordplacering
          pm2 describe bordplacering > /dev/null 2>&1 \
            && pm2 restart bordplacering \
            || PORT=5009 pm2 start server.js --name bordplacering
          pm2 save
